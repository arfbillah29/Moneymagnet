<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyMagnet - Finance Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/feather-icons"></script>

<!-- CSS kustom -->
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- NAVBAR -->
<nav class="bg-blue-700 text-white p-4">
  <div class="container mx-auto flex justify-between">
    <h1 class="text-xl font-bold flex items-center gap-2">
      <i data-feather="dollar-sign"></i> MoneyMagnet
    </h1>
  </div>
</nav>

<div class="container mx-auto p-6">

  <!-- SUMMARY -->
  <div class="grid md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded shadow">
      <p class="text-gray-500">Total Income</p>
      <h2 id="totalIncome" class="text-2xl font-bold text-green-600">Rp 0</h2>
    </div>
    <div class="bg-white p-6 rounded shadow">
      <p class="text-gray-500">Total Expense</p>
      <h2 id="totalExpense" class="text-2xl font-bold text-red-600">Rp 0</h2>
    </div>
    <div class="bg-white p-6 rounded shadow">
      <p class="text-gray-500">Net Profit</p>
      <h2 id="netProfit" class="text-2xl font-bold text-blue-600">Rp 0</h2>
    </div>
  </div>

  <!-- FORM -->
  <div class="bg-white p-6 rounded shadow mb-8">
    <h2 class="text-lg font-bold mb-4">Add Transaction</h2>
    <div id="transactionForm" class="grid md:grid-cols-2 gap-4">

      <select id="type" class="border p-2 rounded">
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
      </select>

      <input type="text" id="category" placeholder="Category" class="border p-2 rounded">

      <input type="text" id="description" placeholder="Description" class="border p-2 rounded">

      <input type="number" id="amount" placeholder="Amount" class="border p-2 rounded">

      <textarea id="notes" placeholder="Notes" class="border p-2 rounded md:col-span-2"></textarea>

      <button id="submitBtn" class="bg-blue-600 text-white p-2 rounded md:col-span-2 hover:bg-blue-700 flex justify-center items-center gap-2">
        <i data-feather="plus"></i> Add Transaction
      </button>

    </div>
  </div>

  <!-- TABLE -->
  <div class="bg-white p-6 rounded shadow mb-8">
    <h2 class="text-lg font-bold mb-4">Transaction List</h2>

    <div class="overflow-x-auto">
      <table class="w-full border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2">Type</th>
            <th class="p-2">Category</th>
            <th class="p-2">Description</th>
            <th class="p-2">Amount</th>
            <th class="p-2">Notes</th>
            <th class="p-2">Action</th>
          </tr>
        </thead>
        <tbody id="transactionTable"></tbody>
      </table>
    </div>
  </div>

  <!-- CHART -->
  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-lg font-bold mb-4">Income vs Expense</h2>
    <div class="w-full md:w-1/2 mx-auto">
      <canvas id="financeChart"></canvas>
    </div>
  </div>

</div>

<!-- Footer -->
<footer class="bg-gray-800 text-white py-8 mt-12">
  <div class="container mx-auto px-4 text-center">
    <p class="text-gray-400 text-sm">© 2025 MoneyMagnet. All rights reserved.</p>
    <p class="text-gray-400 text-sm">Copyright BY ARIF</p>
  </div>
</footer>

<!-- Script -->
<script src="script.js" defer></script>

</body>
</html>
